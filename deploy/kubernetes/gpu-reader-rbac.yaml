apiVersion: v1
kind: ServiceAccount
metadata:
  name: neuralnav-backend
  namespace: neuralnav
  labels:
    app.kubernetes.io/part-of: neuralnav
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: neuralnav-gpu-reader
  labels:
    app.kubernetes.io/part-of: neuralnav
rules:
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: neuralnav-gpu-reader
  labels:
    app.kubernetes.io/part-of: neuralnav
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: neuralnav-gpu-reader
subjects:
- kind: ServiceAccount
  name: neuralnav-backend
  namespace: neuralnav
