apiVersion: v1
kind: ServiceAccount
metadata:
  name: planner-backend
  namespace: planner
  labels:
    app.kubernetes.io/part-of: planner
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: planner-gpu-reader
  labels:
    app.kubernetes.io/part-of: planner
rules:
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: planner-gpu-reader
  labels:
    app.kubernetes.io/part-of: planner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: planner-gpu-reader
subjects:
- kind: ServiceAccount
  name: planner-backend
  namespace: planner
