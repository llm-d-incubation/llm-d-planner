apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: neuralnav
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: neuralnav
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/part-of: neuralnav
    spec:
      containers:
        - name: postgres
          image: registry.redhat.io/rhel9/postgresql-16:latest
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRESQL_DATABASE
              value: neuralnav
            - name: POSTGRESQL_USER
              value: neuralnav
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: neuralnav-secrets
                  key: postgres-password
          volumeMounts:
            - name: data
              mountPath: /var/lib/pgsql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "neuralnav"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "neuralnav"]
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: neuralnav
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: neuralnav
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: neuralnav
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: neuralnav
spec:
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - port: 5432
      targetPort: 5432
