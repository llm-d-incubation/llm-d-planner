apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: planner
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: planner
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
        app.kubernetes.io/part-of: planner
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: planner-backend
      containers:
        - name: backend
          image: quay.io/llm-d-planner/llm-d-planner-backend:latest
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: planner-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: planner-secrets
                  key: postgres-password
            - name: DATABASE_URL
              value: postgresql://planner:$(POSTGRES_PASSWORD)@postgres:5432/planner
            - name: MODEL_CATALOG_TOKEN
              valueFrom:
                secretKeyRef:
                  name: planner-secrets
                  key: model-catalog-token
                  optional: true
            - name: OLLAMA_HOST
              value: http://ollama:11434
            - name: OLLAMA_MODEL
              value: granite3.3:2b
            - name: API_HOST
              value: "0.0.0.0"
            - name: API_PORT
              value: "8000"
            - name: CORS_ORIGINS
              value: "*"
          volumeMounts:
            - name: service-ca
              mountPath: /etc/pki/service-ca
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 10
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
      volumes:
        - name: service-ca
          configMap:
            name: planner-service-ca
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: planner
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: planner
spec:
  selector:
    app.kubernetes.io/name: backend
  ports:
    - port: 8000
      targetPort: 8000
