apiVersion: batch/v1
kind: Job
metadata:
  name: db-init
  namespace: planner
  labels:
    app.kubernetes.io/name: db-init
    app.kubernetes.io/part-of: planner
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: db-init
        app.kubernetes.io/part-of: planner
    spec:
      restartPolicy: OnFailure
      containers:
        - name: db-init
          image: quay.io/llm-d-planner/llm-d-planner-backend:latest
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: planner-secrets
                  key: postgres-password
            - name: DATABASE_URL
              value: postgresql://planner:$(POSTGRES_PASSWORD)@postgres:5432/planner
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: planner-secrets
                  key: postgres-password
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              echo "Waiting for PostgreSQL to be ready..."
              retries=0
              max_retries=30
              until pg_isready -h postgres -U planner -d planner; do
                retries=$((retries + 1))
                if [ "$retries" -ge "$max_retries" ]; then
                  echo "ERROR: PostgreSQL not ready after $max_retries attempts, giving up."
                  exit 1
                fi
                echo "  postgres not ready, retrying in 2s... (attempt $retries/$max_retries)"
                sleep 2
              done
              echo "PostgreSQL is ready."

              echo ""
              echo "============================================================"
              echo "Initializing schema..."
              echo "============================================================"
              psql -h postgres -U planner -d planner < /app/scripts/schema.sql
              echo "Schema initialized."

              echo ""
              echo "============================================================"
              echo "Loading benchmark data..."
              echo "============================================================"
              python scripts/load_benchmarks.py data/benchmarks/performance/benchmarks_BLIS.json
              python scripts/load_benchmarks.py data/benchmarks/performance/benchmarks_interpolated_v2.json
              python scripts/load_benchmarks.py data/benchmarks/performance/benchmarks_estimated_performance.json
              echo ""
              echo "All benchmark data loaded successfully."
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
