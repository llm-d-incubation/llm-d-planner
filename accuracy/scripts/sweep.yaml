# Canonical run matrix for the vLLM memory validation campaign.
# Edit defaults.node_selector to match your cluster's GPU node label.
# Run `kubectl get nodes --show-labels` to find the right label.
defaults:
  gpu: H100-80GB
  gpu_memory_utilization: "0.95"
  max_model_len: 8192
  pp: 1
  dp: 1
  dtype: auto
  kv_cache_dtype: auto
  quantization: null
  vllm_image: vllm/vllm-openai:v0.19.0
  namespace: llmdplanner
  results_pvc: vllm-mem-data
  node_selector:
    # CHANGE THIS to match your cluster's GPU node label.
    # Example alternatives:
    #   nvidia.com/gpu.product: NVIDIA-A100-SXM4-80GB
    #   cloud.google.com/gke-accelerator: nvidia-h100-80gb
    nvidia.com/gpu.product: NVIDIA-H100-80GB-HBM3

runs:
  # ── Core model coverage ───────────────────────────────────────────────────
  # One run per model at the minimum feasible TP. TP sensitivity is captured
  # separately in the "Argument sensitivity: tensor parallelism" section below.

  # DONE: moonshotai/Kimi-VL-A3B-Instruct tp=1
  # - model: moonshotai/Kimi-VL-A3B-Instruct  # 16B total, 3B active MoE, vision-language
  #   tp: 1
  #   trust_remote_code: true

  # DONE: moonshotai/Kimi-Dev-72B tp=2
  # - model: moonshotai/Kimi-Dev-72B           # 72B dense, Qwen2 architecture
  #   tp: 2                                    # tp=1 OOM: ~144 GiB weights exceed single H100 80GB
  #   trust_remote_code: true

  - model: codellama/CodeLlama-7b-hf           # 7B dense; LlamaForCausalLM architecture
    tp: 1

  - model: codellama/CodeLlama-34b-hf          # 34B dense; ~65 GiB bf16; tp=1 OOM risk, using tp=2
    tp: 2

  - model: deepseek-ai/DeepSeek-V2-Lite-Chat  # 16B total, 2.4B active MoE; DeepSeekV2 arch
    tp: 1

  - model: ibm-granite/granite-3.1-2b-instruct
    tp: 1
    _label: granite-3-1-2b

  - model: ibm-granite/granite-3.1-8b-instruct
    tp: 1
    _label: granite-3-1-8b

  - model: ibm-granite/granite-3.3-8b-instruct
    tp: 1

  - model: ibm-granite/granite-vision-3.3-2b  # vision-language; GraniteSpeechEncoderModel arch
    tp: 1

  - model: microsoft/phi-4                    # 14B dense; Phi3 architecture
    tp: 1

  - model: mistralai/Mistral-Small-3.1-24B-Instruct-2503  # 24B dense; Mistral3 architecture
    tp: 1

  - model: mistralai/Mixtral-8x7B-Instruct-v0.1  # 56B total, 14B active MoE
    tp: 2  # tp=1 OOM: ~87 GiB weights exceed single H100 80GB

  - model: openai/gpt-oss-20b                # 20B dense; tp=1 OOM during CUDA graph warmup
    tp: 2
  # gpt-oss-120b skipped — OOM or infra unavailability at all tested tp values

  - model: Qwen/Qwen2.5-7B-Instruct          # 7B dense; reference model for sensitivity sweeps
    tp: 1

  - model: Qwen/Qwen2.5-72B-Instruct         # 72B dense
    tp: 2  # tp=1 OOM: ~144 GiB weights exceed single H100 80GB

  - model: Qwen/Qwen3-8B                     # 8B dense; Qwen3 architecture
    tp: 1

  - model: Qwen/Qwen3-30B-A3B               # 30B total, 3B active MoE; Qwen3Moe architecture
    tp: 1

  - model: meta-llama/Llama-4-Scout-17B-16E-Instruct  # 109B total, 17B active MoE (16 experts)
    tp: 4  # tp=1 OOM (~212 GiB total), tp=2 OOM (~106 GiB total)

  # ── Gemma models ──────────────────────────────────────────────────────────
  # Requires hf-token-gemma secret (separate from hf-token; Gemma repos are gated).
  - model: google/gemma-2-2b-it              # 2.6B dense; Gemma2 architecture
    tp: 1
    hf_token_secret: hf-token-gemma

  - model: google/gemma-2-9b-it              # 9.2B dense; Gemma2 architecture
    tp: 1
    hf_token_secret: hf-token-gemma

  - model: google/gemma-2-27b-it             # 27.2B dense; fits H100 80GB at bf16 (~54 GiB weights)
    tp: 1
    hf_token_secret: hf-token-gemma

  - model: google/gemma-3-4b-it              # 4B dense; Gemma3 architecture
    tp: 1
    hf_token_secret: hf-token-gemma

  - model: google/gemma-3-12b-it             # 12B dense; Gemma3 architecture
    tp: 1
    hf_token_secret: hf-token-gemma

  - model: google/gemma-3-27b-it             # 27B dense; Gemma3 architecture
    tp: 1
    hf_token_secret: hf-token-gemma

  # ── Kimi Dev 72B TP sensitivity (retry tp=4; tp=2 succeeded) ─────────────
  - model: moonshotai/Kimi-Dev-72B
    tp: 4
    trust_remote_code: true
    _sweep_dim: tp

  # ── Argument sensitivity: tensor parallelism ─────────────────────────────
  # Llama-3.1-8B has 32 attention heads; tp=3 is invalid (32 % 3 ≠ 0).
  - model: meta-llama/Llama-3.1-8B-Instruct
    tp: [1, 2, 4]
    _sweep_dim: tp

  - model: Qwen/Qwen2.5-7B-Instruct          # 28 attention heads; valid tp: 1, 2, 4, 7, 14, 28
    tp: [1, 2, 4]
    _sweep_dim: tp

  # ── Argument sensitivity: data parallelism ────────────────────────────────
  - model: meta-llama/Llama-3.1-8B-Instruct
    tp: 1
    dp: [1, 2]
    _sweep_dim: dp

  # ── Argument sensitivity: pipeline parallelism ───────────────────────────
  - model: meta-llama/Llama-3.1-8B-Instruct
    tp: 1
    pp: [2, 4]
    _sweep_dim: pp

  # ── Argument sensitivity: --max-model-len ────────────────────────────────
  - model: meta-llama/Llama-3.1-8B-Instruct
    tp: 1
    max_model_len: [2048, 4096, 8192, 16384, 32768]
    _sweep_dim: max_model_len

  - model: Qwen/Qwen2.5-7B-Instruct
    tp: 1
    max_model_len: [2048, 4096, 8192, 16384, 32768]
    _sweep_dim: max_model_len

  # ── Argument sensitivity: --dtype ─────────────────────────────────────────
  # DONE: all three dtype values completed
  # - model: meta-llama/Llama-3.1-8B-Instruct
  #   tp: 1
  #   dtype: [float16, bfloat16, float32]
  #   kv_cache_dtype: auto
  #   _sweep_dim: dtype

  # ── Argument sensitivity: --kv-cache-dtype ────────────────────────────────
  # DONE: both auto and fp8 completed
  # - model: meta-llama/Llama-3.1-8B-Instruct
  #   tp: 1
  #   dtype: bfloat16
  #   kv_cache_dtype: [auto, fp8]
  #   _sweep_dim: kv_cache_dtype

  # DONE: both auto and fp8 completed
  # - model: Qwen/Qwen2.5-7B-Instruct
  #   tp: 1
  #   dtype: bfloat16
  #   kv_cache_dtype: [auto, fp8]
  #   _sweep_dim: kv_cache_dtype

  # ── Argument sensitivity: non-power-of-2 tp ──────────────────────────────
  # INVALID: Qwen3-14B vocab_size=151936 is not divisible by 5 (vLLM enforces
  # vocab sharding). num_attention_heads=40 supports tp=5, but vocab does not.
  # Valid tp values: divisors of gcd(40, 151936)=8 → {1,2,4,8}.
  # - model: Qwen/Qwen3-14B
  #   tp: 5
  #   _sweep_dim: tp_odd

  # ── Argument sensitivity: --quantization ──────────────────────────────────
  # DONE: FP16 baseline (same run_id as dtype=float16 above)
  # - model: meta-llama/Llama-3.1-8B-Instruct   # FP16 baseline
  #   tp: 1
  #   dtype: float16
  #   kv_cache_dtype: auto
  #   quantization: null
  #   _sweep_dim: quantization

  # runtime fp8 quantization — not yet done
  - model: meta-llama/Llama-3.1-8B-Instruct
    tp: 1
    quantization: fp8
    _sweep_dim: quantization

  # DONE: w8a8
  # - model: RedHatAI/Meta-Llama-3.1-8B-Instruct-quantized.w8a8
  #   tp: 1
  #   dtype: float16
  #   kv_cache_dtype: auto
  #   quantization: null
  #   _label: w8a8-redhatai-llama-3-1-8b
  #   _sweep_dim: quantization

  # DONE: w4a16
  # - model: RedHatAI/Meta-Llama-3.1-8B-Instruct-quantized.w4a16
  #   tp: 1
  #   dtype: float16
  #   kv_cache_dtype: auto
  #   quantization: null
  #   _label: w4a16-redhatai-llama-3-1-8b
  #   _sweep_dim: quantization

  # DONE: w8a8 Mistral (tp=1 and tp=2)
  # - model: RedHatAI/Mistral-Small-3.1-24B-Instruct-2503-quantized.w8a8
  #   tp: 1
  #   _label: w8a8-mistral-small-24b
  #   _sweep_dim: quantization

  # DONE: fp8-dynamic (tp=2 and tp=4)
  # - model: RedHatAI/Llama-3.3-70B-Instruct-fp8-dynamic
  #   tp: 2  # tp=1 OOM: ~65 GiB fp8 weights leave <5 GiB KV on single H100
  #   _label: fp8dyn-llama-3-3-70b
  #   _sweep_dim: quantization

  - model: redhatai/Llama-3.3-70B-Instruct-quantized.w8a8
    tp: 2  # tp=1 OOM for same reason
    _sweep_dim: quantization

  # DONE: w8a8 Qwen2.5 7B
  # - model: RedHatAI/Qwen2.5-7B-Instruct-quantized.w8a8
  #   tp: 1
  #   _label: w8a8-redhatai-qwen2-5-7b
  #   _sweep_dim: quantization

  # DONE: fp8-dynamic Qwen2.5 7B
  # - model: RedHatAI/Qwen2.5-7B-Instruct-fp8-dynamic
  #   tp: 1
  #   _label: fp8dyn-redhatai-qwen2-5-7b
  #   _sweep_dim: quantization

  # ── vLLM version sensitivity: activation memory across releases ───────────
  # Goal: validate whether activation constants change across vLLM versions.
  # Model: Qwen3-14B (tp=1, ~28 GiB bf16; tp=5 invalid — vocab not divisible).
  # See sweep-versions.yaml to run these; results go in results/v<X>/
  # DONE: v0.15.0
