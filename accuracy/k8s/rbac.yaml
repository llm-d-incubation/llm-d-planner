apiVersion: v1
kind: ServiceAccount
metadata:
  name: vllm-mem-orchestrator
  namespace: llmdplanner
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vllm-mem-orchestrator
  namespace: llmdplanner
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vllm-mem-orchestrator
  namespace: llmdplanner
subjects:
  - kind: ServiceAccount
    name: vllm-mem-orchestrator
    namespace: llmdplanner
roleRef:
  kind: Role
  name: vllm-mem-orchestrator
  apiGroup: rbac.authorization.k8s.io
