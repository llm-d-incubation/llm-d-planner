# This file is a template — the token value is never committed to the repo.
#
# Create the Secret before running the campaign:
#
#   kubectl create secret generic hf-token \
#     --from-literal=token=hf_YOUR_TOKEN_HERE \
#     --namespace llmdplanner
#
# Or apply this file after substituting the token:
#   HF_TOKEN=hf_xxx envsubst < accuracy/k8s/hf-secret.yaml | kubectl apply -f -
#
apiVersion: v1
kind: Secret
metadata:
  name: hf-token
  namespace: llmdplanner
type: Opaque
stringData:
  token: "${HF_TOKEN}"   # NEVER commit a real token here
